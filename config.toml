baseURL = "https://kinderfile.com/"
languageCode = "en-us"
title = "KinderFile — Staff Credential Compliance Tracking for Daycare Centers"
paginate = 10
enableRobotsTXT = false

[params]
  description = "Track CPR certs, background checks & 4 more credential types for daycare staff. Automatic SMS reminders. Free 90-day pilot for PG County directors."
  og_image = "/images/og-kinderfile.png"
  author = "Brad Clements"
  ga4_id = ""

[taxonomies]
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[permalinks]
  blog = "/blog/:slug/"
