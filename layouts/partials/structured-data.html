{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "KinderFile",
  "applicationCategory": "BusinessApplication",
  "description": "Staff credential compliance tracking and automated SMS reminders for daycare centers. Tracks CPR certifications, background checks, CPS clearances, and more.",
  "operatingSystem": "Web",
  "url": "https://kinderfile.com",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD",
    "description": "Free 90-day pilot for Prince George's County daycare directors"
  },
  "provider": {
    "@type": "Organization",
    "name": "KinderFile",
    "url": "https://kinderfile.com",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Bowie",
      "addressRegion": "MD",
      "addressCountry": "US"
    }
  }
}
</script>
{{ else if and .IsPage (eq .Section "blog") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "url": "{{ .Permalink }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Person",
    "name": "{{ with .Params.author }}{{ . }}{{ else }}Brad Clements{{ end }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "KinderFile",
    "url": "https://kinderfile.com"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  }
}
</script>
{{ end }}
